<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Movies</title>
    <style>
        table { width: 80%; border-collapse: collapse; margin-top: 30px; }
        th, td { border: 1px solid black; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <h1>안녕하세요 신민찬입니다</h1>
    <p>다음은 제가 영화를 볼 때 자주 방문하는 웹페이지들입니다. 해당 사이트들을 누르면 접속 가능합니다.</p>    
    <ul>
        <li><a href="https://www.imdb.com" target="_blank">IMDb</a></li>
        <li><a href="https://www.netflix.com" target="_blank">Netflix</a></li>
    </ul>
    <table>
        <caption>표1. Top3 영화</caption>
        <thead>
            <tr>
                <th rowspan="2">순위</th>
                <th colspan="3">영화 정보</th>
            </tr>
            <tr>
                <th>제목 (Title)</th>
                <th>포스터</th>
                <th>명대사 (Tagline)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Matrix</td>
                <td>
                    <img src="./Matrix.jpg" alt="Matrix" width="150" height="200">
                </td>
                <td>You have to make a choice</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Inception</td>
                <td>
                    <img src="./Inception.jpg" alt="Inception" width="150" height="200">
                </td>
                <td>Dreams feel real while we're in them</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Interstellar</td>
                <td>
                    <img src="./Interstellar.jpg" alt="Interstellar" width="150" height="200">
                </td>
                <td>Mankind was born on Earth. It was never meant to die here.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
