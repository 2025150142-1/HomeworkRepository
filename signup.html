<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>

    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
    <p><a href="login.html">로그인</a> | 회원가입</p>

    <div class="container">
        <form>
            <div class="input-group">
                <label>이름 :</label>
                <input type="text" autofocus placeholder="이름 입력">
            </div>

            <div class="input-group">
                <label>생일 :</label>
                <input type="date" required>
            </div>

            <div class="input-group">
                <label>성별 :</label>
                <input type="radio" name="gender" value="m"> 남성
                <input type="radio" name="gender" value="f" style="margin-left: 20px;"> 여성
            </div>

            <div class="input-group">
                <label>학년 :</label>
                <input type="number" step="1" min="1" max="4" value="1">
            </div>

            <div class="input-group">
                <label>아이디 :</label>
                <input type="text" autocomplete="username" required>
            </div>

            <div class="input-group">
                <label>비밀번호 :</label>
                <input type="password" required>
            </div>

            <div class="input-group">
                <label>이메일 :</label>
                <input type="email">
            </div>

            <div class="input-group">
                <label>보안 질문 :</label>
                <select>
                    <option>질문을 선택하세요</option>
                    <option>어린 시절 가장 친한 친구의 별명은?</option>
                    <option>부모님이 만나신 도시는?</option>
                    <option>첫 반려동물의 이름은?</option>
                </select>
            </div>

            <div class="input-group">
                <label>답변 :</label>
                <input type="text">
            </div>

            <div class="button-container">
                <button type="submit" class="btn-signup">Signup</button>
                <button type="reset" class="btn-cancel">Cancel</button>
            </div>
        </form>
    </div>

</body>
</html>
