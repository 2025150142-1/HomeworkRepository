<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>

    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
    <p>로그인 | <a href="signup.html">회원가입</a></p>

    <div class="container">
        <form>
            <div class="input-group">
                <label>아이디 :</label>
                <input type="text" required placeholder="ID">
            </div>
            <div class="input-group">
                <label>비밀번호 :</label>
                <input type="password" required placeholder="Password">
            </div>
            <div class="button-container">
                <button type="submit" class="btn-signup">Login</button>
                <button type="button" class="btn-cancel" onclick="location.href='signup.html'">Back</button>
            </div>
        </form>
    </div>

</body>
</html>
